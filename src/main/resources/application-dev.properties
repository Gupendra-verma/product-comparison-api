# application-dev.properties
# Development environment configuration
# This file is for local development only

# Server Configuration
server.port=8091

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:dev-password}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration (verbose for debugging)
logging.level.root=INFO
logging.level.com.example.ProductComparison=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Redis Cache Configuration
spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000

# JWT Configuration (use dev secret)
app.jwt.secret=${JWT_SECRET:dev-secret-only-32-chars-minimum}
app.jwt.expiry-seconds=3600

# Admin Registration Configuration
app.admin.registration-key=${ADMIN_REGISTRATION_KEY:admin-key-0910}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.use-root-path=true
springdoc.show-actuator=false
springdoc.paths-to-match=/auth/**,/products/**,/compare/**
springdoc.packages-to-scan=com.example.ProductComparison.Controller
