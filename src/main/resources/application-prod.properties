# application-prod.properties
# Production environment configuration
# Optimize for performance and security

# Server Configuration
server.port=8080

# Database Configuration (use environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Database Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging Configuration (minimal for performance)
logging.level.root=WARN
logging.level.com.example.ProductComparison=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Redis Cache Configuration (production instance)
spring.cache.type=redis
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}
spring.redis.timeout=3000
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-idle=10
spring.redis.lettuce.pool.min-idle=5

# JWT Configuration (use strong production secret)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-seconds=3600

# Admin Registration Configuration
app.admin.registration-key=${ADMIN_REGISTRATION_KEY}

# Swagger/OpenAPI Configuration (disabled in production)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
